<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroEdu - Sign Up</title>
    <style>
        /* Base Styling (Matches your login page) */
        body {
            background: linear-gradient(135deg, #e6f0fa 0%, #ffffff 100%);
            color: #333333;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 85, 255, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .logo-section h1 {
            color: #004aad;
            margin: 0 0 5px 0;
            font-size: 1.8rem;
        }

        .tagline {
            color: #6c7a89;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background-color: #f4f8ff;
            border: 1px solid #d1e3f8;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            border-color: #007bff;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #007bff, #00c6ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
            margin-top: 10px;
        }

        /* --- Custom Sliding Gender Toggle --- */
        .gender-toggle-container {
            margin-bottom: 20px;
        }
        
        .gender-toggle-label {
            display: block;
            text-align: left;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #6c7a89;
            font-weight: 600;
        }

        .toggle-box {
            position: relative;
            display: flex;
            background-color: #f4f8ff;
            border: 1px solid #d1e3f8;
            border-radius: 12px;
            height: 45px;
            cursor: pointer;
        }

        .slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: calc(50% - 4px);
            height: calc(100% - 4px);
            background: #007bff;
            border-radius: 10px;
            transition: transform 0.3s ease, background-color 0.3s ease;
            z-index: 1;
        }

        .option {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            font-weight: bold;
            color: #6c7a89;
            transition: color 0.3s ease;
            user-select: none;
        }

        /* Classes added by JavaScript to slide the button */
        .is-male .slider { transform: translateX(0); background: #007bff; }
        .is-male .opt-male { color: #ffffff; }
        .is-female .slider { transform: translateX(100%); background: #e83e8c; }
        .is-female .opt-female { color: #ffffff; }

        /* Step containers */
        #step2 {
            display: none; /* Hidden by default */
        }
        
        .back-btn {
            background: none;
            border: none;
            color: #6c7a89;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 15px;
            text-align: left;
            width: 100%;
            padding: 0;
        }
        .back-btn:hover { color: #007bff; text-decoration: underline; }

    </style>
</head>
<body>

    <div class="login-container">
        
        <div id="step1">
            <div class="logo-section">
                <h1>Create Account</h1>
                <p class="tagline">Step 1 of 2: Let's get to know you</p>
            </div>

            <form id="formStep1">
                <div class="input-group">
                    <input type="text" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Email ID" required>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Organization Name" required>
                </div>

                <div class="gender-toggle-container">
                    <span class="gender-toggle-label">Gender</span>
                    <div class="toggle-box is-male" id="genderToggle">
                        <div class="slider"></div>
                        <div class="option opt-male">Male</div>
                        <div class="option opt-female">Female</div>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Next Step ➡️</button>
            </form>
            
            <p style="margin-top: 20px; font-size: 0.9rem; color: #6c7a89;">
                Already have an account? <a href="index.html" style="color: #007bff; text-decoration: none; font-weight: bold;">Sign In</a>
            </p>
        </div>

        <div id="step2">
            <button class="back-btn" id="btnBack">⬅️ Back</button>
            
            <div class="logo-section">
                <h1>Set Password</h1>
                <p class="tagline">Step 2 of 2: Secure your account</p>
            </div>

            <form id="formStep2">
                <div class="input-group">
                    <input type="password" id="pass" placeholder="Password" required minlength="6">
                </div>
                <div class="input-group">
                    <input type="password" id="confirmPass" placeholder="Confirm Password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-primary">Complete Sign Up ✅</button>
            </form>
        </div>

    </div>

    <script>
        // Logic for the Gender Slide Button
        const genderToggle = document.getElementById('genderToggle');
        let selectedGender = 'male'; // default

        genderToggle.addEventListener('click', () => {
            if (selectedGender === 'male') {
                genderToggle.classList.remove('is-male');
                genderToggle.classList.add('is-female');
                selectedGender = 'female';
            } else {
                genderToggle.classList.remove('is-female');
                genderToggle.classList.add('is-male');
                selectedGender = 'male';
            }
        });

        // Logic to move to Step 2
        document.getElementById('formStep1').addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent page refresh
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        });

        // Logic to go back to Step 1
        document.getElementById('btnBack').addEventListener('click', function() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        });

        // Logic to finish Sign Up and go to Sign In (index.html)
        document.getElementById('formStep2').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const pass = document.getElementById('pass').value;
            const confirmPass = document.getElementById('confirmPass').value;

            if (pass !== confirmPass) {
                alert("Passwords do not match! Please try again.");
                return;
            }

            // If everything is good, alert success and redirect to login page!
            alert("Account created successfully! Redirecting to login...");
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
