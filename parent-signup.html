<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroEdu - Parent Sign Up</title>
    <style>
        /* CSS: Core styling matching index.html and parent-login.html */
        body { 
            background: linear-gradient(135deg, #e6f0fa 0%, #ffffff 100%); 
            color: #333333; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .signup-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 450px; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0, 85, 255, 0.08); 
            text-align: center; 
        }
        
        /* Massive centerpiece logo */
        .custom-logo { 
            width: 220px; 
            height: auto; 
            margin-bottom: 20px; 
        }

        h2 { 
            color: #004aad; 
            margin-top: 0; 
            margin-bottom: 25px; 
            font-size: 1.6rem; 
        }
        
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }

        /* Modern input styling */
        .input-group input { 
            width: 100%; 
            padding: 14px 16px; 
            background-color: #f4f8ff; 
            border: 1px solid #d1e3f8; 
            border-radius: 12px; 
            font-size: 1rem; 
            color: #333; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease; 
        }

        .input-group input:focus { 
            border-color: #007bff; 
            background-color: #ffffff; 
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); 
        }

        /* Blue Gradient Action Button */
        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, #007bff, #00c6ff); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3); 
            transition: transform 0.2s; 
            margin-top: 10px;
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
        }

        .login-link { 
            margin-top: 25px; 
            font-size: 0.9rem; 
            color: #6c7a89; 
        }

        .login-link a { 
            color: #007bff; 
            text-decoration: none; 
            font-weight: 600; 
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <img src="logo.png" alt="NeuroEdu Logo" class="custom-logo">
        <h2>Parent Registration</h2>

        <form id="parentSignupForm">
            <div class="input-group">
                <input type="text" id="parentName" placeholder="Parent Full Name" required>
            </div>

            <div class="input-group">
                <input type="text" id="childUsername" placeholder="Student Username" required>
            </div>

            <div class="input-group">
                <input type="email" id="parentEmail" placeholder="Parent Email ID" required>
            </div>

            <div class="input-group">
                <input type="tel" id="parentPhone" placeholder="Phone Number" required>
            </div>

            <div class="input-group">
                <input type="password" id="parentPass" placeholder="Create Password" required>
            </div>

            <button type="submit" class="btn-primary">Create Parent Account</button>
        </form>
        
        <div class="login-link">
            Already have an account? <a href="parent-login.html">Log In</a>
        </div>
    </div>

    <script>
        document.getElementById('parentSignupForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            
            // 1. Save parent name and password to memory
            const parentName = document.getElementById('parentName').value;
            const parentPass = document.getElementById('parentPass').value;
            
            localStorage.setItem('neuroParentName', parentName);
            localStorage.setItem('parentPass', parentPass); // Required for Study Mode Lock

            // 2. Success feedback
            alert("Account created successfully! Welcome, " + parentName + ".");
            
            // 3. Redirect back to parent login
            window.location.href = 'parent-login.html';
        });
    </script>
</body>
</html>
