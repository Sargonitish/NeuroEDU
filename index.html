<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroEdu - Student Login</title>
    <style>
        /* CSS: Core styling and modern blue/white theme */
        body { 
            background: linear-gradient(135deg, #e6f0fa 0%, #ffffff 100%); 
            color: #333333; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }

        .login-container { 
            background-color: #ffffff; 
            width: 100%; 
            max-width: 400px; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 15px 35px rgba(0, 85, 255, 0.08); 
            text-align: center; 
        }
        
        /* Massive, flat centerpiece logo */
        .custom-logo { 
            width: 220px; 
            height: auto; 
            margin-bottom: 25px; 
        }
        
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }

        .input-group input { 
            width: 100%; 
            padding: 14px 16px; 
            background-color: #f4f8ff; 
            border: 1px solid #d1e3f8; 
            border-radius: 12px; 
            font-size: 1rem; 
            color: #333; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.3s ease; 
        }

        .input-group input:focus { 
            border-color: #007bff; 
            background-color: #ffffff; 
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); 
        }

        .forgot-password { 
            text-align: right; 
            margin-bottom: 25px; 
        }

        .forgot-password a, .signup-link a { 
            color: #007bff; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
        }

        .forgot-password a:hover, .signup-link a:hover { 
            text-decoration: underline; 
        }

        .btn-primary { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(90deg, #007bff, #00c6ff); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3); 
            transition: transform 0.2s, box-shadow 0.2s; 
        }

        .btn-primary:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(0, 123, 255, 0.4); 
        }

        .signup-link { 
            margin-top: 20px; 
            font-size: 0.9rem; 
            color: #6c7a89; 
        }

        /* Access Cards Section */
        .access-cards { 
            display: flex; 
            gap: 15px; 
            margin-top: 35px; 
        }

        .card { 
            flex: 1; 
            padding: 15px 10px; 
            background-color: #ffffff; 
            border: 1px solid #e1ebf5; 
            border-radius: 16px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        .card:hover { 
            border-color: #007bff; 
            background-color: #f4f8ff; 
            transform: translateY(-3px); 
            box-shadow: 0 5px 15px rgba(0, 85, 255, 0.05); 
        }

        .card .icon { 
            font-size: 1.5rem; 
            margin-bottom: 5px; 
        }

        .card .card-title { 
            font-size: 0.85rem; 
            font-weight: 700; 
            color: #004aad; 
            margin-bottom: 3px; 
        }

        .card .card-desc { 
            font-size: 0.7rem; 
            color: #8898aa; 
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="logo.png" alt="NeuroEdu Logo" class="custom-logo">

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="usernameInput" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="forgot-password">
                <a href="#">Forgot password?</a>
            </div>
            <button type="submit" class="btn-primary">Log In</button>
        </form>
        
        <div class="signup-link">
            New user? <a href="signup.html">Sign Up</a>
        </div>

        <div class="access-cards">
            <div class="card" id="parentAccessBtn">
                <div class="icon">👥</div>
                <span class="card-title">Parent Access</span>
                <span class="card-desc">(Login as parent)</span>
            </div>
            
            <div class="card" id="orgAccessBtn">
                <div class="icon">🏢</div>
                <span class="card-title">Org Access</span>
                <span class="card-desc">(Login as org)</span>
            </div>
        </div>
    </div>

    <script>
        // Handle Student Login
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            const username = document.getElementById('usernameInput').value;
            localStorage.setItem('neuroUsername', username);
            window.location.href = 'dashboard.html';
        });

        // Handle Parent Portal Redirection
        document.getElementById('parentAccessBtn').addEventListener('click', function() {
            window.location.href = 'parent-login.html';
        });

        // Handle Organization Portal Redirection
        document.getElementById('orgAccessBtn').addEventListener('click', function() {
            window.location.href = 'org-login.html';
        });
    </script>
</body>
</html>
